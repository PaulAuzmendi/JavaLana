<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Software de Gestión de Datos de Sensores para Trenes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>Software de Gestión de Datos de Sensores para Trenes</h1>
  <p class="subtitle">Panel de Monitorización en Tiempo Real - Vagón B74</p>
  <div class="section-title">Sensores Principales</div>
</header>

<button class="toggle-btn" id="toggleBtn">Vista de Arriba</button>

<div class="train-container">

  <!-- ====================== SIDE VIEW ====================== -->
  <svg class="view active" id="sideView" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg">

    <!-- Train body -->
    <rect class="train-body" x="250" y="240" width="700" height="180" rx="8"/>

    <!-- Windows (left section) -->
    <rect class="train-window" x="290" y="262" width="120" height="78" rx="4"/>
    <rect class="train-window" x="430" y="262" width="120" height="78" rx="4"/>

    <!-- Door system in the middle -->
    <rect class="train-window" x="580" y="250" width="38" height="170"/>
    <rect class="train-window" x="622" y="250" width="38" height="170"/>

    <!-- Windows (right section) -->
    <rect class="train-window" x="690" y="262" width="120" height="78" rx="4"/>
    <rect class="train-window" x="830" y="262" width="120" height="78" rx="4"/>

    <!-- Bottom undercarriage rail -->
    <rect class="train-body" x="240" y="420" width="720" height="10"/>

    <!-- Wheels -->
    <circle class="train-wheel" cx="370" cy="450" r="40"/>
    <circle class="train-wheel" cx="830" cy="450" r="40"/>

    <!-- ============ SENSOR ANNOTATIONS ============ -->

    <!-- TEMPERATURA EXTERIOR (top-left -> roof) -->
    <a class="sensor-group" href="verSensor?id=temperaturaExterior" aria-label="Temperatura Exterior">
      <rect class="sensor-box" x="80" y="100" width="240" height="42" rx="4"/>
      <text class="sensor-label" x="200" y="126">TEMPERATURA EXTERIOR</text>
      <path class="sensor-line" d="M 240 142 L 240 200 L 350 200 L 350 240"/>
      <circle class="sensor-dot" cx="350" cy="240" r="4.5"/>
    </a>

    <!-- TEMPERATURA CABINA (top-center -> window interior) -->
    <a class="sensor-group" href="verSensor?id=temperaturaCabina" aria-label="Temperatura Cabina">
      <rect class="sensor-box" x="490" y="100" width="220" height="42" rx="4"/>
      <text class="sensor-label" x="600" y="126">TEMPERATURA CABINA</text>
      <path class="sensor-line" d="M 600 142 L 600 200 L 490 200 L 490 300"/>
      <circle class="sensor-dot" cx="490" cy="300" r="4.5"/>
    </a>

    <!-- TEMPERATURA MOTOR (top-right -> motor area at front) -->
    <a class="sensor-group" href="verSensor?id=temperaturaMotor" aria-label="Temperatura Motor">
      <rect class="sensor-box" x="900" y="100" width="220" height="42" rx="4"/>
      <text class="sensor-label" x="1010" y="126">TEMPERATURA MOTOR</text>
      <path class="sensor-line" d="M 920 142 L 920 220 L 880 220 L 880 410"/>
      <circle class="sensor-dot" cx="880" cy="410" r="4.5"/>
    </a>

    <!-- VELOCÍMETRO TRASERO (bottom-left -> back wheel) -->
    <a class="sensor-group" href="verSensor?id=velocimetroTrasero" aria-label="Velocímetro Trasero">
      <rect class="sensor-box" x="170" y="540" width="250" height="42" rx="4"/>
      <text class="sensor-label" x="295" y="566">VELOCÍMETRO TRASERO</text>
      <path class="sensor-line" d="M 360 540 L 360 480 L 370 460"/>
      <circle class="sensor-dot" cx="370" cy="450" r="4.5"/>
    </a>

    <!-- VELOCÍMETRO DELANTERO (bottom-right -> front wheel) -->
    <a class="sensor-group" href="verSensor?id=velocimetroDelantero" aria-label="Velocímetro Delantero">
      <rect class="sensor-box" x="780" y="540" width="270" height="42" rx="4"/>
      <text class="sensor-label" x="915" y="566">VELOCÍMETRO DELANTERO</text>
      <path class="sensor-line" d="M 850 540 L 850 480 L 830 460"/>
      <circle class="sensor-dot" cx="830" cy="450" r="4.5"/>
    </a>

  </svg>

  <!-- ====================== TOP VIEW ====================== -->
  <svg class="view" id="topView" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg">

    <!-- Train viewed from above (front pointing up) -->
    <path class="train-body"
          d="M 450 540
             L 750 540
             L 750 130
             Q 750 85 600 75
             Q 450 85 450 130
             Z"/>

    <!-- Windshield / front glass -->
    <path class="windshield"
          d="M 470 135
             Q 470 102 600 95
             Q 730 102 730 135
             Z"/>

    <!-- Side windows (left side of train) -->
    <rect class="train-window" x="447" y="190" width="10" height="60" rx="2"/>
    <rect class="train-window" x="447" y="270" width="10" height="60" rx="2"/>
    <rect class="train-window" x="447" y="380" width="10" height="60" rx="2"/>
    <rect class="train-window" x="447" y="460" width="10" height="60" rx="2"/>

    <!-- Side windows (right side of train) -->
    <rect class="train-window" x="743" y="190" width="10" height="60" rx="2"/>
    <rect class="train-window" x="743" y="270" width="10" height="60" rx="2"/>
    <rect class="train-window" x="743" y="380" width="10" height="60" rx="2"/>
    <rect class="train-window" x="743" y="460" width="10" height="60" rx="2"/>

    <!-- Doors (gaps in the side) -->
    <rect class="train-window" x="447" y="345" width="10" height="30"/>
    <rect class="train-window" x="743" y="345" width="10" height="30"/>

    <!-- Center axis (dashed) -->
    <line class="center-line" x1="600" y1="150" x2="600" y2="535"/>

    <!-- Bogies indicators -->
    <rect x="490" y="200" width="220" height="50" fill="none" stroke="var(--train-stroke)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" rx="4"/>
    <rect x="490" y="440" width="220" height="50" fill="none" stroke="var(--train-stroke)" stroke-width="1" stroke-dasharray="3 3" opacity="0.4" rx="4"/>

    <!-- Front sensor anchor dots (shared by radar+lidar at each position) -->
    <circle class="sensor-dot" cx="495" cy="115" r="5"/>
    <circle class="sensor-dot" cx="600" cy="92" r="5"/>
    <circle class="sensor-dot" cx="705" cy="115" r="5"/>

    <!-- ============ SENSOR LABELS (6 independent buttons) ============ -->

    <!-- LEFT SIDE: RADAR IZQUIERDO -->
    <a class="sensor-group" href="verSensor?id=radarIzquierdo" aria-label="Radar Izquierdo">
      <rect class="sensor-box" x="60" y="155" width="220" height="42" rx="4"/>
      <text class="sensor-label" x="170" y="181">RADAR IZQUIERDO</text>
      <path class="sensor-line" d="M 280 176 L 380 176 L 380 130 L 495 115"/>
    </a>

    <!-- LEFT SIDE: LIDAR IZQUIERDO -->
    <a class="sensor-group" href="verSensor?id=lidarIzquierdo" aria-label="Lidar Izquierdo">
      <rect class="sensor-box" x="60" y="215" width="220" height="42" rx="4"/>
      <text class="sensor-label" x="170" y="241">LIDAR IZQUIERDO</text>
      <path class="sensor-line" d="M 280 236 L 360 236 L 360 145 L 495 115"/>
    </a>

    <!-- CENTER: RADAR CENTRO -->
    <a class="sensor-group" href="verSensor?id=radarCentro" aria-label="Radar Centro">
      <rect class="sensor-box" x="380" y="25" width="200" height="42" rx="4"/>
      <text class="sensor-label" x="480" y="51">RADAR CENTRO</text>
      <path class="sensor-line" d="M 560 67 L 600 92"/>
    </a>

    <!-- CENTER: LIDAR CENTRO -->
    <a class="sensor-group" href="verSensor?id=lidarCentro" aria-label="Lidar Centro">
      <rect class="sensor-box" x="620" y="25" width="200" height="42" rx="4"/>
      <text class="sensor-label" x="720" y="51">LIDAR CENTRO</text>
      <path class="sensor-line" d="M 640 67 L 600 92"/>
    </a>

    <!-- RIGHT SIDE: RADAR DERECHO -->
    <a class="sensor-group" href="verSensor?id=radarDerecho" aria-label="Radar Derecho">
      <rect class="sensor-box" x="920" y="155" width="220" height="42" rx="4"/>
      <text class="sensor-label" x="1030" y="181">RADAR DERECHO</text>
      <path class="sensor-line" d="M 920 176 L 820 176 L 820 130 L 705 115"/>
    </a>

    <!-- RIGHT SIDE: LIDAR DERECHO -->
    <a class="sensor-group" href="verSensor?id=lidarDerecho" aria-label="Lidar Derecho">
      <rect class="sensor-box" x="920" y="215" width="220" height="42" rx="4"/>
      <text class="sensor-label" x="1030" y="241">LIDAR DERECHO</text>
      <path class="sensor-line" d="M 920 236 L 840 236 L 840 145 L 705 115"/>
    </a>

    <!-- Direction indicator -->
    <text x="600" y="565" fill="var(--text-dim)" font-family="Chakra Petch, sans-serif" font-size="11" letter-spacing="3" text-anchor="middle" opacity="0.7">
      ▲ DIRECCIÓN DE MARCHA
    </text>

  </svg>

</div>

<!-- Velocidad GPS (centrado) -->
<div class="action-row">
  <form action="gps" method="get">
    <button type="submit" class="action-btn">Velocidad GPS</button>
  </form>
</div>

<!-- ============ LISTA DE SENSORES ============ -->
<div class="subsection-title-wrapper">
  <div class="section-title">Lista de Sensores</div>
</div>
<div class="action-row">
  <form action="lista" method="get">
    <button type="submit" class="action-btn">Ver Lista</button>
  </form>
  <form action="anadirSensor" method="get">
    <button type="submit" class="action-btn">Añadir Sensor</button>
  </form>
  <form action="editarSensor" method="get">
    <button type="submit" class="action-btn">Editar Sensor</button>
  </form>
  <form action="eliminarSensor" method="get">
    <button type="submit" class="action-btn">Eliminar Sensor</button>
  </form>
</div>

<!-- ============ DATOS DE SENSORES ============ -->
<div class="subsection-title-wrapper">
  <div class="section-title">Datos de Sensores</div>
</div>
<div class="action-row">
  <form action="verDatos" method="get">
    <button type="submit" class="action-btn">Ver Datos</button>
  </form>
  <form action="anadirRegistro" method="get">
    <button type="submit" class="action-btn">Añadir Registro</button>
  </form>
  <form action="editarRegistro" method="get">
    <button type="submit" class="action-btn">Editar Registro</button>
  </form>
  <form action="eliminarRegistro" method="get">
    <button type="submit" class="action-btn">Eliminar Registro</button>
  </form>
</div>

<!-- ============ COLISIÓN ============ -->
<div class="action-row">
  <form action="colision" method="get">
    <button type="submit" class="action-btn colision-btn">Colisión</button>
  </form>
</div>

<script>
  const toggleBtn = document.getElementById('toggleBtn');
  const sideView  = document.getElementById('sideView');
  const topView   = document.getElementById('topView');

  let isTopView = false;

  toggleBtn.addEventListener('click', () => {
    isTopView = !isTopView;
    if (isTopView) {
      sideView.classList.remove('active');
      topView.classList.add('active');
      toggleBtn.textContent = 'Vista Lateral';
    } else {
      topView.classList.remove('active');
      sideView.classList.add('active');
      toggleBtn.textContent = 'Vista de Arriba';
    }
  });

  
</script>

</body>
</html>
